<div class="sidebar-inner" ng-controller="SidebarController as sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-mark">AS</div>
    <span class="logo-text">AppSystem</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="nav-label">MENU</span>

      <a class="nav-item" ui-sref="dashboard" ng-class="{active: sidebar.isActive('dashboard')}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <!-- Admin Only -->
      <div ng-if="sidebar.isAdmin">
        <a class="nav-item" ui-sref="products" ng-class="{active: sidebar.isActive('products')}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span>Kelola Barang</span>
        </a>

        <a class="nav-item" ui-sref="users" ng-class="{active: sidebar.isActive('users')}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Kelola User</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="logout-btn" ng-click="sidebar.logout()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Logout</span>
    </button>
  </div>
</div>
