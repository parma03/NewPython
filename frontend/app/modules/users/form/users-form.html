<div class="page-wrapper">
  <div class="form-page-card">
    <div class="form-page-header">
      <button class="back-btn" ng-click="vm.cancel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Kembali
      </button>
      <h2>{{ vm.isEdit ? 'Edit User' : 'Tambah User Baru' }}</h2>
    </div>

    <div class="alert-error" ng-if="vm.error">{{ vm.error }}</div>

    <form ng-submit="vm.save()" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Username <span class="required">*</span></label>
          <input class="form-input" type="text" ng-model="vm.formData.username" placeholder="Masukkan username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input class="form-input" type="email" ng-model="vm.formData.email" placeholder="email@contoh.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password {{ vm.isEdit ? '(kosongkan jika tidak diubah)' : '' }} <span class="required" ng-if="!vm.isEdit">*</span></label>
          <input class="form-input" type="password" ng-model="vm.formData.password"
                 placeholder="{{ vm.isEdit ? 'Password baru (opsional)' : 'Min. 6 karakter' }}"
                 ng-required="!vm.isEdit">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-input" ng-model="vm.formData.role">
            <option value="pelanggan">Pelanggan</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="toggle-label">
          <input type="checkbox" ng-model="vm.formData.is_active" class="toggle-input">
          <span class="toggle-track"></span>
          <span>Status Aktif</span>
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" ng-click="vm.cancel()">Batal</button>
        <button type="submit" class="btn-primary" ng-disabled="vm.loading">
          <span ng-if="!vm.loading">{{ vm.isEdit ? 'Simpan Perubahan' : 'Tambah User' }}</span>
          <span ng-if="vm.loading">Menyimpan...</span>
        </button>
      </div>
    </form>
  </div>
</div>
