<div class="page-wrapper">
  <div class="form-page-card">
    <div class="form-page-header">
      <button class="back-btn" ng-click="vm.cancel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Kembali
      </button>
      <h2>{{ vm.isEdit ? 'Edit Barang' : 'Tambah Barang Baru' }}</h2>
    </div>

    <div class="alert-error" ng-if="vm.error">{{ vm.error }}</div>

    <form ng-submit="vm.save()" novalidate>
      <div class="form-group">
        <label class="form-label">Nama Barang <span class="required">*</span></label>
        <input class="form-input" type="text" ng-model="vm.formData.name" placeholder="Masukkan nama barang" required>
      </div>

      <div class="form-group">
        <label class="form-label">Deskripsi</label>
        <textarea class="form-input form-textarea" ng-model="vm.formData.description" placeholder="Deskripsi barang (opsional)" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Harga (Rp) <span class="required">*</span></label>
          <input class="form-input" type="number" ng-model="vm.formData.price" placeholder="0" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Stok <span class="required">*</span></label>
          <input class="form-input" type="number" ng-model="vm.formData.stock" placeholder="0" min="0" required>
        </div>
      </div>

      <div class="form-group">
        <label class="toggle-label">
          <input type="checkbox" ng-model="vm.formData.is_active" class="toggle-input">
          <span class="toggle-track"></span>
          <span>Status Aktif</span>
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" ng-click="vm.cancel()">Batal</button>
        <button type="submit" class="btn-primary" ng-disabled="vm.loading">
          <span ng-if="!vm.loading">{{ vm.isEdit ? 'Simpan Perubahan' : 'Tambah Barang' }}</span>
          <span ng-if="vm.loading">Menyimpan...</span>
        </button>
      </div>
    </form>
  </div>
</div>
