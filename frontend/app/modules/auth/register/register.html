<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
  </div>

  <div class="auth-card auth-card--wide">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="logo-mark-lg">AS</span>
      </div>
      <h1 class="auth-title">Buat Akun Baru</h1>
      <p class="auth-subtitle">Isi informasi di bawah untuk mendaftar</p>
    </div>

    <form class="auth-form" ng-submit="vm.register()" novalidate>
      <div class="alert-error" ng-if="vm.error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ vm.error }}
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" ng-model="vm.formData.username" placeholder="Pilih username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" ng-model="vm.formData.email" placeholder="email@contoh.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" ng-model="vm.formData.password" placeholder="Min. 6 karakter" required>
        </div>
        <div class="form-group">
          <label class="form-label">Konfirmasi Password</label>
          <input class="form-input" type="password" ng-model="vm.formData.password_confirm" placeholder="Ulangi password" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-input" ng-model="vm.formData.role">
          <option value="pelanggan">Pelanggan</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button class="btn-primary btn-full" type="submit" ng-disabled="vm.loading">
        <span ng-if="!vm.loading">Daftar</span>
        <span ng-if="vm.loading" class="loading-dots"><span></span><span></span><span></span></span>
      </button>
    </form>

    <div class="auth-footer">
      Sudah punya akun?
      <a ui-sref="login" class="auth-link">Masuk di sini</a>
    </div>
  </div>
</div>
